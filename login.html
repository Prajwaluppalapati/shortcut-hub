<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="login.css">
    <title>Shortcut Hub</title>
    <meta charset="UTF-8">
     <link rel="icon" href="logo.png" type="image/x-icon">
     <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="login_main_cnt">
        <div class="login_box">
           <input type="email" id="email" placeholder="Email">
           <input type="password" id="password" placeholder="Password">

          <button onclick="signup()" class="sign_log_btn">Sign Up</button>
          <button onclick="login()" class="sign_log_btn">Login</button>

           <div class="email_google_partition">
            <span>OR</span>
           </div>

          <button onclick="googleLogin()" class="google_login_btn"><i class="fa-brands fa-google"></i>&nbsp; Login with Google</button>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
