<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="main.css">
  <title>Shortcut Hub</title>
   <link rel="icon" href="logo.png" type="image/x-icon"><!-- Temporary logo -->
</head>
<body>
  <div class="keyboard_rect">

    <!-- Starting from Esc to Delete -->
    <div class="key_row_1">
      <div id="esc" class="func_box">Esc</div>
      <div id="f1" class="func_box">F1</div>
      <div id="f2" class="func_box">F2</div>
      <div id="f3" class="func_box">F3</div>
      <div id="f4" class="func_box">F4</div>
      <div id="f5" class="func_box">F5</div>
      <div id="f6" class="func_box">F6</div>
      <div id="f7" class="func_box">F7</div>
      <div id="f8" class="func_box">F8</div>
      <div id="f9" class="func_box">F9</div>
      <div id="f10" class="func_box">F10</div>
      <div id="f11" class="func_box">F11</div>
      <div id="f12" class="func_box">F12</div>
      <div id="prtsc" class="func_box">PrtSc</div>
      <div id="insert" class="func_box">Insert</div>
      <div id="delete" class="func_box">Delete</div>
    </div>

    <!-- Starting from Tab to Backspace -->
    <div class="key_row_2">
        <div class="number_sign_keys_1" id="~">~ <br> `</div>
        <div class="number_sign_keys" id="1">! <br> 1</div>
        <div class="number_sign_keys" id="2">@ <br> 2</div>
        <div class="number_sign_keys" id="3"># <br> 3</div>
        <div class="number_sign_keys" id="4">$ <br> 4</div>
        <div class="number_sign_keys" id="5">% <br> 5</div>
        <div class="number_sign_keys" id="6">^ <br> 6</div>
        <div class="number_sign_keys" id="7">& <br> 7</div>
        <div class="number_sign_keys" id="8">* <br> 8</div>
        <div class="number_sign_keys" id="9">( <br> 9</div>
        <div class="number_sign_keys" id="0">) <br> 0</div>
        <div class="number_sign_keys" id="underscore" style="font-size: 15px;"><p>_ <br> -</p></div>
        <div class="number_sign_keys" id="plus" style="font-size: 11px; font-weight: 550;">+ <br> =</div>
        <div class="number_sign_keys" id="backspace" style="text-align: right; width: 60px;">Backspace</div>
    </div>
  </div>
    <script src="main.js"></script>
</body>
</html>
