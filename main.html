<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="main.css">
  <title>Shortcut Hub</title>
   <link rel="icon" href="logo.png" type="image/x-icon">
   <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
</head>
<body>

  <nav class="mainpage_nav">
      <div class="mainpage_nav_left">
        <a href="index.html">
      <div class="full_logo">
            <p>Shortcut hub</p>
           </div>
          </a>
      </div>

      <div class="mainpage_nav_middle">
         <input type="text" id="navbar_search" class="navbar_search"><i class="fa-solid fa-magnifying-glass"></i>
      </div>

      <div class="mainpage_nav_right">
         <img id="profilePic" class="nav_profile" src="" alt="Profile">
         <div class="profile_dropdown" id="profile_dropdown">
            <span id="userName" class="nav_name">Loading...</span>
            <p class="user_email" id="userEmail"></p>
            <p class="logout_btn" onclick="logout()">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></p>
         </div>
      </div>
  </nav>

  <div class="main_cnt">

      <div class="main_cnt_left">

      </div> <!-- End of main cnt left-->

      <div class="main_cnt_right">
         <div class="streak_cnt">
            <h1 id="streakCount">0</h1>
            <div class="streak_right">
              <div class="fire_background">
                <i class="fa-solid fa-fire"></i>
              </div>
              <p>Current<br>Streak</p>
            </div>
         </div>

         <div class="achievements_cnt">
            <h1> Achievements </h1>
         </div>
      </div> <!-- End of main cnt right -->

  </div><!-- End of main cnt here -->

    <script type="module" src="main.js"></script>
    
</body>
</html>
