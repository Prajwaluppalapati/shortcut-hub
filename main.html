<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="main.css">
  <title>Shortcut Hub</title>
   <link rel="icon" href="logo.png" type="image/x-icon"><!-- Temporary logo -->
</head>
<body>
  <div class="keyboard_rect">

    <div class="key_row_1">
      <div id="esc" class="func_box">Esc</div>
      <div id="f1" class="func_box">F1</div>
      <div id="f2" class="func_box">F2</div>
      <div id="f3" class="func_box">F3</div>
      <div id="f4" class="func_box">F4</div>
      <div id="f5" class="func_box">F5</div>
      <div id="f6" class="func_box">F6</div>
      <div id="f7" class="func_box">F7</div>
      <div id="f8" class="func_box">F8</div>
      <div id="f9" class="func_box">F9</div>
      <div id="f10" class="func_box">F10</div>
      <div id="f11" class="func_box">F11</div>
      <div id="f12" class="func_box">F12</div>
      <div id="prtsc" class="func_box">PrtSc</div>
      <div id="insert" class="func_box">Insert</div>
      <div id="delete" class="func_box">Delete</div>
    </div>

    <div class="key_row_2">
        <div class="number_sign_keys_1" id="~">~ <br> `</div>
        <div class="number_sign_keys" id="1">! <br> 1</div>
        <div class="number_sign_keys" id="2">@ <br> 2</div>
        <div class="number_sign_keys" id="3"># <br> 3</div>
        <div class="number_sign_keys" id="4">$ <br> 4</div>
        <div class="number_sign_keys" id="5">% <br> 5</div>
        <div class="number_sign_keys" id="6">^ <br> 6</div>
        <div class="number_sign_keys" id="7">& <br> 7</div>
        <div class="number_sign_keys" id="8">* <br> 8</div>
        <div class="number_sign_keys" id="9">( <br> 9</div>
        <div class="number_sign_keys" id="0">) <br> 0</div>
        <div class="number_sign_keys" id="underscore" style="font-size: 15px;"><p>_ <br> -</p></div>
        <div class="number_sign_keys" id="plus" style="font-size: 11px; font-weight: 550;">+ <br> =</div>
        <div class="number_sign_keys" id="backspace" style="text-align: right; font-size: 10px; width: 58px;">Backspace</div>
    </div>

    <div class="key_row_1">
      <div id="tab" class="letters_box" style="width: 50px; font-size: 10px;">Tab</div>
      <div id="q" class="letters_box">Q</div>
      <div id="w" class="letters_box">W</div>
      <div id="e" class="letters_box">E</div>
      <div id="r" class="letters_box">R</div>
      <div id="t" class="letters_box">T</div>
      <div id="y" class="letters_box">Y</div>
      <div id="u" class="letters_box">U</div>
      <div id="i" class="letters_box">I</div>
      <div id="o" class="letters_box">O</div>
      <div id="p" class="letters_box">P</div>
      <div id="flower_brk_left" class="letters_box">{ <br> [ </div>
      <div id="flower_brk_right" class="letters_box">} <br> ]</div>
      <div id="slash" class="letters_box" style="width: 38px;">| <br> \</div>
    </div>

     <div class="key_row_1">
      <div id="tab" class="letters_box" style="width: 60px; font-size: 10px;">CapsLk</div>
      <div id="q" class="letters_box">A</div>
      <div id="w" class="letters_box">S</div>
      <div id="e" class="letters_box">D</div>
      <div id="r" class="letters_box">F</div>
      <div id="y" class="letters_box">G</div>
      <div id="u" class="letters_box">H</div>
      <div id="i" class="letters_box">J</div>
      <div id="o" class="letters_box">K</div>
      <div id="p" class="letters_box">L</div>
      <div id="flower_brk_left" class="letters_box">: <br> ; </div>
      <div id="flower_brk_right" class="letters_box">" <br> '</div>
      <div id="slash" class="letters_box" style="width: 67px; text-align: right; font-size: 10px;">Enter</div>
    </div>

     <div class="key_row_1">
      <div id="tab" class="letters_box" style="width: 80px; font-size: 10px;">Shift</div>
      <div id="q" class="letters_box">Z</div>
      <div id="w" class="letters_box">X</div>
      <div id="e" class="letters_box">C</div>
      <div id="u" class="letters_box">V</div>
      <div id="i" class="letters_box">B</div>
      <div id="o" class="letters_box">N</div>
      <div id="p" class="letters_box">M</div>
      <div id="flower_brk_left" class="letters_box">< <br> , </div>
      <div id="flower_brk_right" class="letters_box">> <br> .</div>
      <div id="flower_brk_right" class="letters_box">? <br> /</div>
      <div id="slash" class="letters_box" style="width: 86px; text-align: right; font-size: 10px;">Shift</div>
    </div>

      <div class="key_row_1">
      <div id="tab" class="letters_box" style="width: 40px; font-size: 10px;">Ctrl</div>
      <div id="q" class="letters_box">Fn</div>
      <div id="w" class="letters_box">S</div>
      <div id="e" class="letters_box">D</div>
      <div id="r" class="letters_box">F</div>
      <div id="y" class="letters_box">G</div>
      <div id="u" class="letters_box">H</div>
      <div id="i" class="letters_box">J</div>
      <div id="o" class="letters_box">K</div>
      <div id="p" class="letters_box">L</div>
      <div id="flower_brk_left" class="letters_box">: <br> ; </div>
      <div id="flower_brk_right" class="letters_box">" <br> '</div>
      <div id="slash" class="letters_box" style="width: 67px; text-align: right; font-size: 10px;">Enter</div>
    </div>
  </div>

    <script src="main.js"></script>
</body>
</html>
